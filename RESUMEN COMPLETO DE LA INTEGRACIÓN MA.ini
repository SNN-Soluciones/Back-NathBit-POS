📄 RESUMEN COMPLETO DE LA INTEGRACIÓN MAILRECEPTOR + NATHBIT
🎯 OBJETIVO
Integrar el sistema MailReceptor (procesador de facturas electrónicas vía email) con NathBit POS para automatizar la recepción y procesamiento de facturas de compra.
🏗️ ARQUITECTURA

MailReceptor: Microservicio independiente (Puerto 5002)
NathBit Backend: Sistema principal (Puerto 8080)
Base de datos: PostgreSQL compartida
Almacenamiento: Amazon S3
Flujo: Email → MailReceptor → API NathBit → S3 → BD

📊 TABLAS CREADAS
1. sucursal_receptor_smtp

Configuración de emails por sucursal
Credenciales SMTP (Google APIs)
Control de procesamiento automático

2. factura_recepcion_automatica

Almacena TODOS los campos del XML
Estado de validación con Hacienda
