🔄 FLUJO DE PROCESAMIENTO

Recepción de Email

MailReceptor lee correos cada minuto
Detecta archivos ZIP con XML/PDF
Extrae y parsea XML según formato Hacienda


Identificación

Busca sucursal por email receptor
Valida identificación en XML


Validación Hacienda

Consulta estado de la factura
Si está rechazada, notifica y termina


Envío a NathBit

POST /api/facturas-recepcion/procesar
Sube archivos a S3
Guarda en BD


Conversión a Compra (Manual por ahora)

Usuario revisa y aprueba
Se crea registro en tabla compras
Se actualizan métricas



