# Configuración de producción
server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

spring:
  application:
    name: nathbit-pos-backend

  # Base de datos - SIN sslmode
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nathbitpos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
    open-in-view: false

  # Deshabilitar Reactor Debug Agent
  reactor:
    debug-agent:
      enabled: false

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Costa_Rica

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200,https://nathbit.com}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  exposed-headers: Authorization
  allow-credentials: true
  max-age: 3600

# Logging
logging:
  level:
    root: INFO
    com.snnsoluciones: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: ERROR

# App
app:
  name: NathBit POS
  version: 1.0.0
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000

# Resend
resend:
  api-key: ${RESEND_API_KEY}
  from-email: noreply@nathbit.com
  from-name: NathBit POS

