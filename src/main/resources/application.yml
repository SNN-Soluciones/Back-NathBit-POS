# Actualizar en application.yml

spring:
  application:
    name: nathbit-pos-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nathbitpos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # CAMBIAR DE validate A none o update
      ddl-auto: none  # Flyway maneja el esquema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    show-sql: false
    open-in-view: false
    # IMPORTANTE: Diferir la validación hasta después de Flyway
    defer-datasource-initialization: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # Ejecutar Flyway antes de JPA
    baseline-version: 0
    baseline-description: "Initial"

# Configuración JWT
app:
  jwt:
    secret: ${JWT_SECRET:TuClaveSecretaSeguraDeAlMenos256BitsParaProduccion2024!}
    expiration: 3600 # 1 hora en segundos
    refresh-expiration: 604800 # 7 días en segundos

  security:
    max-intentos-login: 3
    bloqueo-duracion-minutos: 30

# Configuración de logs
logging:
  level:
    root: INFO
    com.snnsoluciones.backnathbitpos: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Configuración del servidor
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Actuator para monitoreo
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized