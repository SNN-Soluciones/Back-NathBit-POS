spring:
  application:
    name: nathbit-pos-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nathbitpos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: validate  # Solo validar, Flyway maneja el esquema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
        # Importante para evitar errores de lazy loading
        enable_lazy_load_no_trans: false
        # Para JSONB
        types:
          print:
            banner: false
    show-sql: false
    open-in-view: false
    # NO diferir la inicialización
    defer-datasource-initialization: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: "Initial"
    locations: classpath:db/migration
    table: flyway_schema_history
    schemas: public
    # Importante: no validar en desarrollo
    validate-on-migrate: false
    # Permitir ejecutar fuera de orden
    out-of-order: true
    # En Flyway 9.0+ usar ignore-migration-patterns en lugar de las propiedades deprecadas
    # ignore-migration-patterns: []

# Configuración JWT
app:
  jwt:
    secret: p52L+wQ5tJvF9Xg8VyQGKBD3eJ6kPmRjY2Nw4hZsA7xU9TnL3mK8vB5rD2fN1qX4
    expiration: 3600 # 1 hora en segundos
    refresh-expiration: 604800 # 7 días en segundos

  security:
    max-intentos-login: 3
    bloqueo-duracion-minutos: 30

# Configuración de logs
logging:
  level:
    root: INFO
    com.snnsoluciones.backnathbitpos: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data: DEBUG
    org.springframework.boot.autoconfigure: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
    org.flywaydb.core: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Configuración del servidor
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

# Actuator para monitoreo
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized