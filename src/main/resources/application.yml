spring:
  application:
    name: restaurant-erp-api

  # Configuraci’┐Įn de base de datos
  datasource:
    url: jdbc:postgresql://${DB_URL:localhost}:5432/${DB_NAME:restaurant_erp_dev}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Configuraci’┐Įn JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    show-sql: false

  # Configuraci’┐Įn Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # Configuraci’┐Įn de seguridad
  security:
    jwt:
      secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnly2024RestaurantERP}
      expiration: 86400000 # 24 horas
      refresh-expiration: 604800000 # 7 d’┐Įas

  # Configuraci’┐Įn de cache
  cache:
    type: simple # cambiar a redis en producci’┐Įn
    cache-names:
      - productos
      - categorias
      - usuarios

  # Jackson configuraci’┐Įn
  jackson:
    time-zone: America/Costa_Rica
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Configuraci’┐Įn del servidor
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.snnsoluciones: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/restaurant-erp.log

# OpenAPI/Swagger configuraci’┐Įn
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

# Configuraci’┐Įn espec’┐Įfica para Hacienda Costa Rica
hacienda:
  api:
    url: ${HACIENDA_API_URL:https://api-sandbox.comprobanteselectronicos.go.cr/recepcion/v1/}
    timeout: 30000
    certificado:
      path: ${HACIENDA_CERT_PATH:}
      password: ${HACIENDA_CERT_PASSWORD:}

# Configuraci’┐Įn Multi-tenant
tenant:
  datasource:
    master-schema: public
    tenant-schema-prefix: tenant_

# Configuraci’┐Įn de aplicaci’┐Įn
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4200}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  file-upload:
    max-size: 10MB
    allowed-extensions: jpg,jpeg,png,pdf