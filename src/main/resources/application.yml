spring:
  application:
    name: backnathbitpos

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:restaurante_erp_dev}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

    # Pool de conexiones
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: HikariPool-MultiTenant

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none # Usamos Flyway para las migraciones
    properties:
      hibernate:
        # Multi-tenant configuration
        multiTenancy: SCHEMA
        tenant_identifier_resolver: com.snnsoluciones.backnathbitpos.config.tenant.TenantIdentifierResolver
        multi_tenant_connection_provider: com.snnsoluciones.backnathbitpos.config.tenant.SchemaBasedMultiTenantConnectionProvider

        # Performance
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

        # Cache de segundo nivel (opcional)
        cache:
          use_second_level_cache: false
          use_query_cache: false

    show-sql: false
    open-in-view: false

  # Flyway configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    schemas: public # Schema base para Flyway
    create-schemas: true
    validate-on-migrate: true

    # Placeholders para usar en scripts
    placeholders:
      default_schema: public
      demo_schema: demo

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-change-this-in-production}
  expiration: ${JWT_EXPIRATION:86400000} # 24 horas en milisegundos
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 días en milisegundos

# Security
security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true

# Logging
logging:
  level:
    root: INFO
    com.snnsoluciones.backnathbitpos: DEBUG
    org.hibernate.SQL: DEBUG # Para ver las queries SQL en desarrollo
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE # Para ver los parámetros de las queries
    org.springframework.security: DEBUG # Para debugging de seguridad
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/backnathbitpos.log

# Actuator (monitoreo)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /api/actuator
  endpoint:
    health:
      show-details: when-authorized

# Server configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Application specific
app:
  name: NathBit POS
  version: '@project.version@'
  description: Sistema POS Multi-tenant para Restaurantes

  # Tenants disponibles (para validación)
  available-tenants:
    - demo
    - tenant1
    - tenant2

  # Configuración de facturación electrónica
  facturacion:
    api-fe-url: ${API_FE_URL:https://api-fe.hacienda.cr}
    timeout: 30000
    retry-attempts: 3