# Configuración actualizada para el sistema multi-empresa
spring:
  application:
    name: nathbit-pos-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nathbitpos}?currentSchema=public
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Usamos Flyway para las migraciones
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration/public
      - classpath:db/migration/tenant
    schemas:
      - public
    default-schema: public

# Configuración JWT
app:
  jwt:
    secret: ${JWT_SECRET:TuClaveSecretaSeguraDeAlMenos256BitsParaProduccion2024!}
    expiration: 3600 # 1 hora en segundos
    refresh-expiration: 604800 # 7 días en segundos

  security:
    max-intentos-login: 3
    bloqueo-duracion-minutos: 30

# Configuración de tenants iniciales
tenants:
  initial-tenants:
    - id: tenant_sj_centro
      nombre: "Sabores San José Centro"
      tipo: SUCURSAL
    - id: tenant_escazu
      nombre: "Sabores Escazú"
      tipo: SUCURSAL
    - id: tenant_heredia
      nombre: "Sabores Heredia"
      tipo: SUCURSAL
    - id: tenant_cafe_mp
      nombre: "Café del Valle - Multiplaza"
      tipo: SUCURSAL
    - id: tenant_cafe_lincoln
      nombre: "Café del Valle - Lincoln"
      tipo: SUCURSAL

# Configuración de logs
logging:
  level:
    root: INFO
    com.snnsoluciones.backnathbitpos: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Configuración del servidor
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# Actuator para monitoreo
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# Configuración de cache
spring.cache:
  type: simple
  cache-names:
    - usuarios
    - sucursal-por-ip
    - sucursal-por-terminal
    - permisos-usuario